<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FriendWarapp - ORN 전략 지휘부</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #020617; --card: rgba(30, 41, 59, 0.9); --accent: #38bdf8; 
            --mingyu: #22c55e; --sechan: #3b82f6; --manjung: #ef4444; 
        }
        body { margin: 0; background: var(--bg); color: #f8fafc; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; font-size: 13px; }
        
        /* 헤더/오버레이 UI 축소 */
        #overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(15px); }
        .login-btn { padding: 1rem 3rem; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; color: white; margin-bottom: 10px; width: 280px; }
        .header { height: 50px; padding: 0 1rem; background: var(--card); border-bottom: 2px solid #334155; display: flex; justify-content: space-between; align-items: center; z-index: 500; }
        
        /* 메인 구조 */
        .main-container { display: flex; flex: 1; overflow: hidden; }
        #map-area { flex: 1; position: relative; overflow: hidden; background: #000; cursor: grab; touch-action: none; }
        
        /* 맵 확대/축소 컨테이너 */
        #map-container { position: absolute; transform-origin: 0 0; transition: transform 0.1s ease-out; }
        #battle-map { 
            position: relative; width: 1024px; height: 768px; 
            background-image: url('./map.png'); background-size: 100% 100%; 
            border: 2px solid #475569;
        }
        #grid-overlay { display: grid; grid-template-columns: repeat(16, 1fr); grid-template-rows: repeat(16, 1fr); width: 100%; height: 100%; }

        /* 타일 및 군대 표시 강화 */
        .tile { border: 0.3px solid rgba(255, 255, 255, 0.1); position: relative; box-sizing: border-box; }
        .tile.owner-mingyu { background: rgba(34, 197, 94, 0.25); }
        .tile.owner-sechan { background: rgba(59, 130, 246, 0.25); }
        .tile.owner-manjung { background: rgba(239, 68, 68, 0.25); }
        
        .unit-badge { 
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; 
            font-size: 14px; font-weight: 800; color: #fff; text-shadow: 0 0 4px #000, 1px 1px 0 #000;
            pointer-events: none; z-index: 5;
        }
        .tile-id { font-size: 9px; position: absolute; top: 1px; left: 1px; opacity: 0.5; }

        /* 패널 축소 */
        #info-panel { width: 300px; background: var(--card); border-left: 2px solid #334155; padding: 1rem; overflow-y: auto; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin: 8px 0; }
        .stat-item { background: rgba(15, 23, 42, 0.9); padding: 8px; border-radius: 4px; border: 1px solid #334155; font-size: 12px; }
        .cmd-btn { width: 100%; margin-top: 5px; padding: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; font-size: 12px; }
    </style>
</head>
<body>
    <div id="overlay">
        <h2 style="letter-spacing: 8px; color: var(--accent);">ORN STRATEGY</h2>
        <div class="btn-group">
            <button class="login-btn" style="background:var(--mingyu)" data-user="서민규">서민규 사령관</button>
            <button class="login-btn" style="background:var(--sechan)" data-user="박세찬">박세찬 사령관</button>
            <button class="login-btn" style="background:var(--manjung)" data-user="김만중">김만중 사령관</button>
        </div>
    </div>

    <div class="header">
        <div id="display-name" style="font-weight:bold; color:var(--accent);">HQ</div>
        <div style="font-size: 12px;">예산: <b id="money" style="color:var(--accent); font-size:16px;">0</b> G</div>
    </div>

    <div class="main-container">
        <div id="map-area">
            <div id="map-container">
                <div id="battle-map">
                    <div id="grid-overlay"></div>
                </div>
            </div>
        </div>
        <div id="info-panel"><div id="panel-content">구역 선택</div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://friendwargme-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myName = "", selectedId = null, scale = 1, offsetX = 0, offsetY = 0;
        const passwords = { "서민규": "140625", "박세찬": "1234**", "김만중": "98765" };

        document.querySelectorAll('.login-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const user = btn.getAttribute('data-user');
                const pw = prompt(`${user} 사령관님, 보안 코드를 입력하십시오.`);
                if (pw === passwords[user]) startGame(user);
            });
        });

        function startGame(name) {
            myName = name;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('display-name').innerText = `HQ: ${myName}`;
            initMapControl();
            syncData();
            startEconomicCycle();
        }

        // 🔄 데이터 동기화 및 군대 시각화
        function syncData() {
            onValue(ref(db, `players/${myName}/resources/money`), s => {
                document.getElementById('money').innerText = Math.floor(s.val() || 0).toLocaleString();
            });

            onValue(ref(db, 'provinces'), (snapshot) => {
                const grid = document.getElementById('grid-overlay');
                const data = snapshot.val() || {};
                grid.innerHTML = "";

                for(let i=1; i<=256; i++) {
                    const id = `P${i}`;
                    const p = data[id] || { id: id, owner: "중립", population: 50000 };
                    const tile = document.createElement('div');
                    
                    let ownerStr = String(p.owner || "중립");
                    let ownerClass = ownerStr.includes("서민규") ? "owner-mingyu" : (ownerStr.includes("박세찬") ? "owner-sechan" : (ownerStr.includes("김만중") ? "owner-manjung" : ""));

                    tile.className = `tile ${ownerClass} ${id === selectedId ? 'selected' : ''}`;
                    tile.innerHTML = `<span class="tile-id">${id}</span>`;
                    
                    // 🎖️ 군대 위치 강조 표시
                    if (p.unit && p.unit.count > 0) {
                        tile.innerHTML += `<div class="unit-badge">🎖️${p.unit.count}</div>`;
                    }

                    tile.onclick = () => {
                        selectedId = id;
                        updateInfoPanel(p);
                        document.querySelectorAll('.tile').forEach(t => t.style.outline = "none");
                        tile.style.outline = "2px solid var(--accent)";
                    };
                    grid.appendChild(tile);
                }
            });
        }

        // 📈 경제/인구 시스템 (24시간 기준 자동 계산)
        function startEconomicCycle() {
            setInterval(async () => {
                const snap = await get(ref(db, 'provinces'));
                const data = snap.val() || {};
                let totalPop = 0;
                let updates = {};

                for(let id in data) {
                    let p = data[id];
                    // 인구 5% 상승 (24시간 환산 시 10분당 약 0.034% 상승 적용)
                    let newPop = Math.floor((p.population || 50000) * 1.00034);
                    updates[`provinces/${id}/population`] = newPop;
                    if(p.owner === myName) totalPop += newPop;
                }
                
                // 자산 증가 (인구 / 50)
                const currentMoneySnap = await get(ref(db, `players/${myName}/resources/money`));
                const newMoney = (currentMoneySnap.val() || 0) + (totalPop / 50 / 144); // 10분 단위 지급
                updates[`players/${myName}/resources/money`] = newMoney;
                
                update(ref(db), updates);
            }, 600000); // 10분마다 실행 (현실감 있게 시뮬레이션)
        }

        // 🔍 확대/축소 및 드래그 제어 (PC/모바일 공용)
        function initMapControl() {
            const area = document.getElementById('map-area');
            const container = document.getElementById('map-container');

            area.addEventListener('wheel', e => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                scale = Math.min(Math.max(0.5, scale * delta), 3);
                container.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
            });

            let isDragging = false, startX, startY;
            area.addEventListener('mousedown', e => { isDragging = true; startX = e.pageX - offsetX; startY = e.pageY - offsetY; });
            window.addEventListener('mouseup', () => isDragging = false);
            window.addEventListener('mousemove', e => {
                if (!isDragging) return;
                offsetX = e.pageX - startX;
                offsetY = e.pageY - startY;
                container.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
            });

            // 모바일 터치 (간략화된 줌)
            area.addEventListener('touchstart', e => { if(e.touches.length === 1) { isDragging = true; startX = e.touches[0].pageX - offsetX; startY = e.touches[0].pageY - offsetY; } });
            area.addEventListener('touchmove', e => {
                if (!isDragging || e.touches.length > 1) return;
                offsetX = e.touches[0].pageX - startX;
                offsetY = e.touches[0].pageY - startY;
                container.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
            });
            area.addEventListener('touchend', () => isDragging = false);
        }

        function updateInfoPanel(p) {
            const content = document.getElementById('panel-content');
            content.innerHTML = `
                <h3 style="margin:0;">${p.id} 구역</h3>
                <div class="stat-grid">
                    <div class="stat-item">👥 인구<br>${(p.population || 50000).toLocaleString()}</div>
                    <div class="stat-item">🚩 소유<br>${p.owner || '중립'}</div>
                </div>
                <button class="cmd-btn" style="background:var(--mingyu)">모집</button>
                <button class="cmd-btn" style="background:#8b5cf6">건설</button>
            `;
        }
    </script>
</body>
</html>
