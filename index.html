<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>FriendWarapp - ORN 세력권 설정</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #020617; --card: rgba(30, 41, 59, 0.9); --accent: #38bdf8; 
            --mingyu: #22c55e; --sechan: #3b82f6; --manjung: #ef4444; 
        }
        body { margin: 0; background: var(--bg); color: #f8fafc; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        #overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(10px); }
        .btn-group button { padding: 1.5rem 3rem; margin: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.2rem; color: white; }

        .header { height: 70px; padding: 0 2rem; background: var(--card); border-bottom: 2px solid #334155; display: flex; justify-content: space-between; align-items: center; z-index: 500; }

        .main-container { display: flex; flex: 1; overflow: hidden; }
        #map-area { flex: 1; position: relative; overflow: auto; background: #000; display: flex; align-items: center; justify-content: center; }

        #battle-map { 
            position: relative; 
            width: 1024px; height: 768px; 
            background-image: url('map.png'); 
            background-size: 100% 100%;
            border: 4px solid #475569;
        }

        #grid-overlay { display: grid; grid-template-columns: repeat(16, 1fr); grid-template-rows: repeat(16, 1fr); width: 100%; height: 100%; }

        .tile { 
            border: 0.5px solid rgba(255, 255, 255, 0.1); 
            cursor: pointer; position: relative; transition: 0.1s; 
            background: transparent; /* 지형 배경 제거 */
        }

        /* 🟢 세력별 배경색 (지형 배경 대신 타일 전체에 적용) */
        .tile.owner-mingyu { background: rgba(34, 197, 94, 0.35) !important; border: 1px solid var(--mingyu); }
        .tile.owner-sechan { background: rgba(59, 130, 246, 0.35) !important; border: 1px solid var(--sechan); }
        .tile.owner-manjung { background: rgba(239, 68, 68, 0.35) !important; border: 1px solid var(--manjung); }

        .tile:hover { background: rgba(255, 255, 255, 0.2) !important; border: 1.5px solid #fff; z-index: 10; }
        .tile.selected { outline: 3px solid var(--accent); z-index: 15; box-shadow: inset 0 0 15px var(--accent); }

        .tile-id { font-size: 0.5rem; position: absolute; top: 2px; left: 2px; opacity: 0.5; font-weight: bold; }
        
        #info-panel { width: 380px; background: var(--card); border-left: 2px solid #334155; padding: 1.5rem; box-sizing: border-box; overflow-y: auto; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.85rem; margin-top: 10px; }
        .stat-item { background: rgba(15, 23, 42, 0.8); padding: 10px; border-radius: 5px; border: 1px solid #334155; }
    </style>
</head>
<body>
    <div id="overlay">
        <h1 style="font-size: 3rem; margin-bottom: 2rem; letter-spacing: 10px;">TERRITORY EDITOR</h1>
        <div class="btn-group">
            <button style="background:var(--mingyu)" onclick="startGame('서민규')">서민규</button>
            <button style="background:var(--sechan)" onclick="startGame('박세찬')">박세찬</button>
            <button style="background:var(--manjung)" onclick="startGame('김만중')">김만중</button>
        </div>
    </div>

    <div class="header">
        <h2 id="display-name" style="margin:0; color:var(--accent);">세력권 설정 (지형 고정)</h2>
        <div style="color: #94a3b8; font-size: 0.9rem;">클릭: [중립-서-박-김] 순환</div>
    </div>

    <div class="main-container">
        <div id="map-area">
            <div id="battle-map">
                <div id="grid-overlay"></div>
            </div>
        </div>
        <div id="info-panel">
            <div id="panel-content">
                <p style="text-align:center; opacity:0.5; margin-top:100px;">타일을 클릭하여<br>영토 소유권을 배분하세요.</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://friendwargme-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let myName = "";
        let selectedId = null;

        window.startGame = function(name) {
            myName = name;
            document.getElementById('overlay').style.display = 'none';
            
            onValue(ref(db, 'provinces'), (snapshot) => {
                const grid = document.getElementById('grid-overlay');
                const data = snapshot.val() || {};
                grid.innerHTML = "";
                
                for(let i=1; i<=256; i++) {
                    const id = `P${i}`;
                    const p = data[id] || { id: id, owner: "중립", terrain: "바다" };
                    const tile = document.createElement('div');
                    
                    // 🎨 소유자별 배경 클래스 적용
                    let ownerClass = "";
                    if(p.owner === "서민규") ownerClass = "owner-mingyu";
                    else if(p.owner === "박세찬") ownerClass = "owner-sechan";
                    else if(p.owner === "김만중") ownerClass = "owner-manjung";

                    tile.className = `tile ${ownerClass} ${id === selectedId ? 'selected' : ''}`;
                    tile.innerHTML = `<span class="tile-id">${id}</span>`;
                    
                    tile.onclick = () => {
                        selectedId = id;
                        
                        const owners = ['중립', '서민규', '박세찬', '김만중'];
                        let currentIdx = owners.indexOf(p.owner || '중립');
                        let nextOwner = owners[(currentIdx + 1) % owners.length];
                        
                        // ⚠️ 오직 owner만 업데이트하여 지형(terrain)을 보존합니다.
                        update(ref(db, `provinces/${id}`), {
                            owner: nextOwner,
                            id: id
                        });

                        updateInfoPanel(p, nextOwner);
                        document.querySelectorAll('.tile').forEach(t => t.classList.remove('selected'));
                        tile.classList.add('selected');
                    };
                    grid.appendChild(tile);
                }
            });
        };

        function updateInfoPanel(p, nextOwner) {
            const content = document.getElementById('panel-content');
            // p.owner는 DB 갱신 전 값일 수 있으므로 nextOwner를 활용
            const displayOwner = nextOwner || p.owner || "중립";
            
            content.innerHTML = `
                <div class="info-header">
                    <h2 style="margin:0;">${p.id} 구역</h2>
                    <h1 style="color:var(--accent); margin:10px 0;">${displayOwner}</h1>
                </div>
                <div class="stat-grid">
                    <div class="stat-item"><b>보존된 지형</b><br>${p.terrain || '바다'}</div>
                    <div class="stat-item"><b>상태</b><br>영토 점령 중</div>
                </div>
                <div style="margin-top:30px; padding:15px; background:rgba(255,255,255,0.05); border-radius:10px;">
                    <p style="font-size:0.85rem; line-height:1.6;">
                        ✅ <b>지형 고정 완료</b><br>
                        이제 클릭해도 지형은 바뀌지 않습니다.<br>
                        반투명한 색상이 타일 전체를 덮어 영토를 표시합니다.
                    </p>
                </div>
            `;
        }
    </script>
</body>
</html>
