<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>FriendWarapp - 사령관 선택</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: 'Malgun Gothic', sans-serif; text-align: center; }
        #login-screen { padding: 50px; }
        .btn-group { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; transition: 0.3s; }
        .btn-mingyu { background: #2e7d32; color: white; } /* 서민규 (초록) */
        .btn-sechan { background: #1565c0; color: white; } /* 박세찬 (파랑) */
        .btn-manjung { background: #c62828; color: white; } /* 김만중 (빨강) */
        button:hover { transform: scale(1.1); filter: brightness(1.2); }
        
        #game-screen { display: none; }
        .status-bar { background: #333; padding: 15px; border-bottom: 2px solid #444; }
        #map { display: grid; grid-template-columns: repeat(5, 120px); gap: 10px; justify-content: center; margin: 20px; }
        .province { width: 120px; height: 120px; border: 2px solid #555; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; }
        .owner-me { border: 4px solid #fff; box-shadow: 0 0 15px rgba(255,255,255,0.5); } /* 내 땅 강조 */
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>사령관을 선택하십시오</h1>
        <div class="btn-group">
            <button class="btn-mingyu" onclick="startGame('서민규')">서민규</button>
            <button class="btn-sechan" onclick="startGame('박세찬')">박세찬</button>
            <button class="btn-manjung" onclick="startGame('김만중')">김만중</button>
        </div>
    </div>

    <div id="game-screen">
        <div class="status-bar">
            <h2 id="my-name">사령관: -</h2>
            <p>자금: <span id="money">0</span>G | 상태: <span id="server-status">연결 중...</span></p>
        </div>
        <div id="map"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://friendwargme-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myName = "";

        // 게임 시작 함수
        window.startGame = function(name) {
            myName = name;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('my-name').innerText = `사령관: ${myName}`;
            
            initMap();
        };

        function initMap() {
            // 돈 업데이트
            onValue(ref(db, `players/${myName}/resources/money`), (snapshot) => {
                document.getElementById('money').innerText = snapshot.val() || 0;
            });

            // 지도 업데이트
            onValue(ref(db, 'provinces'), (snapshot) => {
                const data = snapshot.val();
                const mapDiv = document.getElementById('map');
                mapDiv.innerHTML = "";
                
                for (let id in data) {
                    const prov = data[id];
                    const div = document.createElement('div');
                    
                    // 소유주에 따른 색상 변경
                    let bgColor = "#444"; // 중립
                    if (prov.owner === "서민규") bgColor = "#2e7d32";
                    if (prov.owner === "박세찬") bgColor = "#1565c0";
                    if (prov.owner === "김만중") bgColor = "#c62828";
                    
                    div.style.backgroundColor = bgColor;
                    div.className = `province ${prov.owner === myName ? 'owner-me' : ''}`;
                    div.innerHTML = `<b>${id}</b><br>${prov.type}<br>병력: ${prov.units || 0}`;
                    mapDiv.appendChild(div);
                }
            });
        }

        // 서버 체크
        fetch("https://friendwarapp.onrender.com")
            .then(() => document.getElementById('server-status').innerText = "서버 가동 중 ✅");
    </script>
</body>
</html>
