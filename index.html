<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>FriendWarapp - Command Center</title>
    <style>
        :root { --accent: #38bdf8; --mingyu: #22c55e; --sechan: #3b82f6; --manjung: #ef4444; }
        body { margin: 0; background: #020617; color: #f8fafc; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }

        /* 레이아웃 구조 */
        .header { height: 50px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; background: #020617; z-index: 1000; }
        .container { display: flex; flex: 1; overflow: hidden; }
        #viewport { flex: 1; position: relative; overflow: hidden; background: #000; cursor: grab; }
        
        /* 지도 및 격자 레이어 */
        #map-layer { position: absolute; transform-origin: 0 0; width: 1024px; height: 768px; }
        #map-img { position: absolute; inset: 0; background: url('map.png') no-repeat; background-size: 100% 100%; z-index: 1; }
        #grid { position: absolute; inset: 0; display: grid; grid-template-columns: repeat(16, 1fr); grid-template-rows: repeat(16, 1fr); z-index: 10; }

        /* 섹터 타일 */
        .tile { border: 0.1px solid rgba(255,255,255,0.1); box-sizing: border-box; cursor: pointer; transition: 0.2s; pointer-events: auto !important; }
        .tile:hover { background: rgba(255,255,255,0.1); }
        .tile.selected { border: 3px solid #fff !important; box-shadow: inset 0 0 20px #fff; z-index: 20; background: rgba(255,255,255,0.2) !important; }
        
        /* 세력 색상 (불투명도 조절로 지도 보이게) */
        .tile.m { background: rgba(34, 197, 94, 0.4); }
        .tile.s { background: rgba(59, 130, 246, 0.4); }
        .tile.mj { background: rgba(239, 68, 68, 0.4); }

        /* 🚨 우측 패널 (여기가 중요) */
        #side-panel { width: 300px; background: #0f172a; border-left: 2px solid var(--accent); padding: 25px; box-sizing: border-box; z-index: 500; overflow-y: auto; }
        .panel-header { font-size: 24px; color: var(--accent); font-weight: bold; margin-bottom: 20px; border-bottom: 1px solid var(--accent); padding-bottom: 10px; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-action { background: var(--accent); color: #000; }
        
        /* 로그인 */
        #login-gate { position: fixed; inset: 0; background: #020617; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body>

    <div id="login-gate">
        <div style="text-align:center; background:#0f172a; padding:40px; border:1px solid var(--accent); border-radius:10px;">
            <h2 style="color:var(--accent)">COMMANDER AUTH</h2>
            <input type="text" id="id-input" placeholder="사령관명" style="display:block; width:100%; margin-bottom:10px; padding:10px;">
            <input type="password" id="pw-input" placeholder="패스코드" style="display:block; width:100%; margin-bottom:10px; padding:10px;">
            <button onclick="authorize()" style="width:100%; padding:10px; background:var(--accent); border:none; font-weight:bold; cursor:pointer;">CONNECT</button>
        </div>
    </div>

    <div class="header">
        <div>USER: <b id="u-name">OFFLINE</b></div>
        <div>CREDIT: <b id="u-money">0</b> G</div>
    </div>

    <div class="container">
        <div id="viewport">
            <div id="map-layer">
                <div id="map-img"></div>
                <div id="grid"></div>
            </div>
        </div>
        <div id="side-panel">
            <div id="side-content">
                <p style="text-align:center; opacity:0.5; margin-top:100px;">섹터를 선택하여 작전을 개시하십시오.</p>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://friendwargme-default-rtdb.firebaseio.com/" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myName = "", selId = null, scale = 0.8, px = 0, py = 0;
    let isMoving = false;

    // 전역 함수로 등록 (어디서든 호출 가능하게)
    window.authorize = () => {
        const id = document.getElementById('id-input').value.trim();
        const pw = document.getElementById('pw-input').value.trim();
        const db_auth = { "서민규": "140625", "박세찬": "1234**", "김만중": "98765" };
        if (db_auth[id] === pw) {
            myName = id;
            document.getElementById('u-name').innerText = id;
            document.getElementById('login-gate').style.display = "none";
            startSystem();
        } else { alert("인증 실패"); }
    };

    function startSystem() {
        renderGrid();
        syncData();
        initCamera();
    }

    function renderGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        for(let i=1; i<=256; i++) {
            const id = `P${i}`;
            const tile = document.createElement('div');
            tile.id = `tile-${id}`;
            tile.className = 'tile';
            // 🚨 클릭 이벤트 확실하게 박기
            tile.onclick = (e) => {
                if(isMoving) return;
                window.selectSector(id);
            };
            grid.appendChild(tile);
        }
    }

    window.selectSector = async (id) => {
        selId = id;
        console.log("Sector Selected:", id);
        
        // 시각적 효과
        document.querySelectorAll('.tile').forEach(t => t.classList.remove('selected'));
        document.getElementById(`tile-${id}`).classList.add('selected');

        // 우측 패널 갱신
        const side = document.getElementById('side-content');
        side.innerHTML = "로딩 중...";

        const snap = await get(ref(db, `provinces/${id}`));
        const data = snap.val() || { owner: "중립", population: 50000 };
        
        side.innerHTML = `
            <div class="panel-header">SECTION ${id}</div>
            <div class="info-row"><span>지배 세력</span><b style="color:var(--accent)">${data.owner}</b></div>
            <div class="info-row"><span>거주 인구</span><b>${(data.population||50000).toLocaleString()} 명</b></div>
            <button class="btn btn-action" onclick="alert('${id} 작전 준비')">작전 명령 하달</button>
        `;
    };

    function syncData() {
        // 돈 동기화
        onValue(ref(db, `players/${myName}/resources/money`), s => {
            document.getElementById('u-money').innerText = Math.floor(s.val()||0).toLocaleString();
        });

        // 지도 세력 동기화
        onValue(ref(db, 'provinces'), snap => {
            const data = snap.val() || {};
            Object.keys(data).forEach(id => {
                const tile = document.getElementById(`tile-${id}`);
                if(!tile) return;
                const owner = data[id].owner || "";
                tile.classList.remove('m', 's', 'mj');
                if(owner === "서민규") tile.classList.add('m');
                else if(owner === "박세찬") tile.classList.add('s');
                else if(owner === "김만중") tile.classList.add('mj');
            });
        });
    }

    function initCamera() {
        const view = document.getElementById('viewport'), layer = document.getElementById('map-layer');
        const updateTransform = () => layer.style.transform = `translate(${px}px, ${py}px) scale(${scale})`;
        let active = false, lx, ly;

        view.onpointerdown = (e) => { active = true; isMoving = false; lx = e.clientX; ly = e.clientY; view.setPointerCapture(e.pointerId); };
        window.onpointermove = (e) => {
            if(!active) return;
            let dx = e.clientX - lx, dy = e.clientY - ly;
            if(Math.abs(dx) > 3 || Math.abs(dy) > 3) isMoving = true;
            px += dx; py += dy; lx = e.clientX; ly = e.clientY; updateTransform();
        };
        window.onpointerup = () => { active = false; };
        view.onwheel = (e) => { scale -= e.deltaY * 0.001; scale = Math.min(Math.max(0.3, scale), 2); updateTransform(); };
        
        // 초기 중앙 정렬
        px = (view.clientWidth - 1024 * scale) / 2;
        py = (view.clientHeight - 768 * scale) / 2;
        updateTransform();
    }
</script>
</body>
</html>
