<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ORN COMMAND CENTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        /* 사령관님 스타일 취향 저격: 다크 & 사이버 */
        :root { --accent: #38bdf8; --mingyu: #22c55e; --sechan: #3b82f6; --manjung: #ef4444; }
        body { margin: 0; background: #020617; color: #f8fafc; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; font-size: 11px; }
        
        /* 헤더 디자인 */
        .header { height: 45px; padding: 0 1rem; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; background: #020617; z-index: 10; }
        .header b { font-family: 'Orbitron'; color: var(--accent); font-size: 16px; }

        .container { display: flex; flex: 1; overflow: hidden; }
        
        /* 지도 (무제한 이동 지원) */
        #viewport { flex: 1; position: relative; overflow: hidden; background: radial-gradient(#1e293b 1px, transparent 1px); background-size: 30px 30px; cursor: grab; }
        #map-layer { position: absolute; transform-origin: center; width: 1024px; height: 768px; }
        #map-img { width: 100%; height: 100%; background: url('./map.png') no-repeat; background-size: 100% 100%; position: relative; }
        #grid { display: grid; grid-template-columns: repeat(16, 1fr); grid-template-rows: repeat(16, 1fr); width: 100%; height: 100%; }

        /* 타일 가시성 */
        .tile { border: 0.1px solid rgba(255,255,255,0.05); }
        .tile.m { background: rgba(34, 197, 94, 0.1); border: 1px solid var(--mingyu); }
        .tile.s { background: rgba(59, 130, 246, 0.1); border: 1px solid var(--sechan); }
        .tile.mj { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--manjung); }

        /* 🚨 절대 안 깨지게 만든 사이드 UI */
        #side-panel { width: 300px; background: rgba(15, 23, 42, 0.95); border-left: 1px solid #334155; padding: 20px; backdrop-filter: blur(10px); }
        .panel-title { font-family: 'Orbitron'; color: var(--accent); border-bottom: 1px solid #475569; padding-bottom: 10px; margin-bottom: 15px; font-size: 14px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 0.5px solid #1e293b; padding-bottom: 5px; }
        
        .btn { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 4px; font-weight: bold; color: white; cursor: pointer; text-transform: uppercase; font-size: 10px; }
        .btn-green { background: var(--mingyu); }
        .btn-red { background: var(--manjung); }
        
        #sub-list { margin-top: 15px; padding: 10px; background: #0f172a; border-radius: 5px; border: 1px solid var(--accent); display: none; }
        .unit-opt { padding: 8px; margin-bottom: 5px; background: #1e293b; display: flex; justify-content: space-between; cursor: pointer; border-radius: 3px; }
    </style>
</head>
<body>

    <div class="header">
        <div><span style="font-size:9px; opacity:0.5;">COMMANDER</span> <b id="u-name">-</b></div>
        <div>CREDIT: <b id="u-money">0</b> <span style="font-size:9px;">G</span></div>
    </div>

    <div class="container">
        <div id="viewport">
            <div id="map-layer">
                <div id="map-img"><div id="grid"></div></div>
            </div>
        </div>
        
        <div id="side-panel">
            <div id="side-content">
                <p style="text-align:center; margin-top:100px; opacity:0.2;">섹터를 선택하십시오.</p>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://friendwargme-default-rtdb.firebaseio.com/" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myName = "", selId = null, scale = 0.8;
    let px = window.innerWidth/2 - 400, py = window.innerHeight/2 - 300;

    // 1. 로그인 (이건 사령관님이 직접 입력하시니까)
    window.onload = () => {
        const u = prompt("지휘관 성함을 입력하십시오.");
        if(u) { myName = u; document.getElementById('u-name').innerText = u; init(); sync(); }
    };

    function sync() {
        // 돈 동기화
        onValue(ref(db, `players/${myName}/resources/money`), s => {
            document.getElementById('u-money').innerText = Math.floor(s.val()||0).toLocaleString();
        });

        // 지도 동기화
        onValue(ref(db, 'provinces'), (snapshot) => {
            const grid = document.getElementById('grid');
            const data = snapshot.val() || {};
            grid.innerHTML = "";
            for(let i=1; i<=256; i++) {
                const id = `P${i}`;
                const p = data[id] || { owner: "중립", population: 50000 };
                const div = document.createElement('div');
                div.className = `tile ${p.owner.includes("서민규")?'m':p.owner.includes("박세찬")?'s':p.owner.includes("김만중")?'mj':''}`;
                if(id === selId) div.style.boxShadow = "inset 0 0 10px #fff";
                div.onclick = () => { selId = id; updateUI(p); sync(); };
                grid.appendChild(div);
            }
        });
    }

    function updateUI(p) {
        const side = document.getElementById('side-content');
        const isMine = (p.owner === myName);
        side.innerHTML = `
            <div class="panel-title">SECTION ${p.id}</div>
            <div class="row"><span>소유권</span><span>${p.owner}</span></div>
            <div class="row"><span>인구</span><span>${p.population.toLocaleString()}명</span></div>
            <button class="btn ${isMine?'btn-green':'btn-red'}" onclick="toggleList()">${isMine?'병력 모집':'공격 개시'}</button>
            <div id="sub-list">
                <div class="unit-opt" onclick="work('보병', 100, 1)"><span>💂 보병</span><span>100G</span></div>
                <div class="unit-opt" onclick="work('전차', 500, 3)"><span>🚜 전차</span><span>500G</span></div>
                <div class="unit-opt" onclick="work('전투기', 400, 2)"><span>🛩️ 전투기</span><span>400G</span></div>
            </div>
        `;
    }

    window.toggleList = () => {
        const l = document.getElementById('sub-list');
        l.style.display = l.style.display === 'block' ? 'none' : 'block';
    };

    window.work = async (n, c, t) => {
        const mSnap = await get(ref(db, `players/${myName}/resources/money`));
        const money = mSnap.val() || 0;
        if(money < c) return alert("예산 부족!");
        
        const finish = Date.now() + (t * 3600000); // 실제 시간 계산
        const updates = {};
        updates[`provinces/${selId}/work`] = { name: n, finishAt: finish, owner: myName };
        updates[`players/${myName}/resources/money`] = money - c;
        update(ref(db), updates).then(() => alert(`${n} 생산 시작!`));
    };

    function init() {
        const view = document.getElementById('viewport');
        const layer = document.getElementById('map-layer');
        const draw = () => layer.style.transform = `translate(${px}px, ${py}px) scale(${scale})`;
        
        let moving = false, lx, ly;
        view.onmousedown = (e) => { moving = true; lx = e.clientX; ly = e.clientY; };
        window.onmousemove = (e) => {
            if(!moving) return;
            px += (e.clientX - lx); py += (e.clientY - ly);
            lx = e.clientX; ly = e.clientY; draw();
        };
        window.onmouseup = () => moving = false;
        view.onwheel = (e) => { scale -= e.deltaY * 0.0005; scale = Math.min(Math.max(0.1, scale), 3); draw(); };
        draw();
    }
</script>
</body>
</html>
