<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>FriendWarapp - 전술 지휘실</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --mingyu: #22c55e; --sechan: #3b82f6; --manjung: #ef4444; }
        body { margin: 0; background: var(--bg); color: #f8fafc; font-family: 'Pretendard', sans-serif; }
        #overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .btn-group button { padding: 1.2rem 2.5rem; margin: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1.1rem; }
        .btn-m { background: var(--mingyu); color: white; }
        .btn-s { background: var(--sechan); color: white; }
        .btn-j { background: var(--manjung); color: white; }
        .header { padding: 1.5rem; background: var(--card); border-bottom: 2px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        #map { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1.5rem; padding: 2rem; max-width: 1200px; margin: auto; }
        .province { background: var(--card); padding: 1.5rem; border-radius: 15px; border: 2px solid #334155; text-align: center; transition: 0.3s; }
        .province.me { border-color: var(--accent); box-shadow: 0 0 20px rgba(56, 189, 248, 0.15); }
        .unit-count { font-size: 2rem; font-weight: 800; color: #fff; margin: 10px 0; }
    </style>
</head>
<body>
    <div id="overlay">
        <h1>지휘관을 선택하십시오</h1>
        <div class="btn-group">
            <button class="btn-m" onclick="startGame('서민규')">서민규</button>
            <button class="btn-s" onclick="startGame('박세찬')">박세찬</button>
            <button class="btn-j" onclick="startGame('김만중')">김만중</button>
        </div>
    </div>

    <div class="header">
        <h2 id="display-name" style="margin:0; color:var(--accent);">전술 상황판</h2>
        <div>자금: <b id="money" style="font-size:1.5rem;">0</b> G</div>
    </div>
    <div id="map"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://friendwargme-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let myName = "";

        window.startGame = function(name) {
            myName = name;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('display-name').innerText = `지휘관: ${myName}`;
            
            // 실시간 자금 업데이트
            onValue(ref(db, `players/${myName}/resources/money`), s => {
                document.getElementById('money').innerText = s.val() || 0;
            });

            // 실시간 지도 업데이트
            onValue(ref(db, 'provinces'), (snapshot) => {
                const mapDiv = document.getElementById('map');
                const data = snapshot.val();
                if (!data) return;
                mapDiv.innerHTML = "";
                for (let id in data) {
                    const p = data[id];
                    const card = document.createElement('div');
                    card.className = `province ${p.owner === myName ? 'me' : ''}`;
                    let color = p.owner === "서민규" ? "#22c55e" : (p.owner === "박세찬" ? "#3b82f6" : "#ef4444");
                    card.style.borderTop = `6px solid ${color}`;
                    card.innerHTML = `
                        <div style="color:${color}; font-weight:bold;">${p.owner || '중립'}</div>
                        <div style="font-size:1.2rem; margin:5px 0;">${id}</div>
                        <div class="unit-count">${p.units || 0}</div>
                        <div style="font-size:0.9rem; opacity:0.6;">${p.type}</div>
                    `;
                    mapDiv.appendChild(card);
                }
            });
        };
    </script>
</body>
</html>
