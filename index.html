<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>FriendWarapp - 임시 타이틀!</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #020617; --card: rgba(30, 41, 59, 0.9); --accent: #38bdf8; 
            --mingyu: #22c55e; --sechan: #3b82f6; --manjung: #ef4444; 
        }
        body { margin: 0; background: var(--bg); color: #f8fafc; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        /* 시작 오버레이 */
        #overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(10px); }
        .btn-group button { padding: 1.5rem 3rem; margin: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.2rem; color: white; transition: 0.2s; }
        .btn-group button:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* 헤더 */
        .header { height: 70px; padding: 0 2rem; background: var(--card); border-bottom: 2px solid #334155; display: flex; justify-content: space-between; align-items: center; z-index: 500; }

        /* 메인 컨테이너 */
        .main-container { display: flex; flex: 1; overflow: hidden; }
        
        /* ⚠️ 전장 영역 */
        #map-area { 
            flex: 1; 
            position: relative; 
            overflow: auto; 
            background: #000; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }

        #battle-map { 
            position: relative; 
            width: 1024px; /* 이미지 비율에 맞춰 조정 가능 */
            height: 768px; 
            /* ⚠️ 최상위 경로의 map.png 연결 */
            background-image: url('./map.png'); 
            background-size: 100% 100%;
            border: 4px solid #475569;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        /* 격자 오버레이 */
        #grid-overlay { 
            display: grid; 
            grid-template-columns: repeat(16, 1fr); 
            grid-template-rows: repeat(16, 1fr); 
            width: 100%; 
            height: 100%; 
        }

        .tile { 
            border: 0.5px solid rgba(255, 255, 255, 0.1); 
            cursor: pointer; 
            position: relative;
            transition: 0.1s;
        }

        .tile:hover { background: rgba(56, 189, 248, 0.2); border: 1.5px solid #fff; z-index: 10; }
        .tile.selected { background: rgba(56, 189, 248, 0.3); outline: 2px solid var(--accent); z-index: 15; box-shadow: inset 0 0 15px var(--accent); }

        .tile.me { border: 1px solid var(--accent); box-shadow: inset 0 0 10px rgba(56, 189, 248, 0.2); }

        .tile-id { font-size: 0.5rem; position: absolute; top: 2px; left: 2px; opacity: 0.5; pointer-events: none; text-shadow: 1px 1px 2px #000; }
        .unit-marker { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            pointer-events: none; text-shadow: 1px 1px 3px #000; 
        }

        /* 정보 패널 */
        #info-panel { 
            width: 380px; background: var(--card); border-left: 2px solid #334155; 
            padding: 1.5rem; box-sizing: border-box; overflow-y: auto; backdrop-filter: blur(5px);
        }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.85rem; }
        .stat-item { background: rgba(15, 23, 42, 0.8); padding: 10px; border-radius: 5px; border: 1px solid #334155; }
        .cmd-btn { width: 100%; margin-top: 10px; padding: 14px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
    </style>
</head>
<body>
    <div id="overlay">
        <h1 style="font-size: 3rem; margin-bottom: 2rem; letter-spacing: 10px;">ORN STRATEGY</h1>
        <div class="btn-group">
            <button class="btn-m" style="background:var(--mingyu)" onclick="startGame('서민규')">서민규</button>
            <button class="btn-s" style="background:var(--sechan)" onclick="startGame('박세찬')">박세찬</button>
            <button class="btn-j" style="background:var(--manjung)" onclick="startGame('김만중')">김만중</button>
        </div>
    </div>

    <div class="header">
        <h2 id="display-name" style="margin:0; color:var(--accent);">COMMAND CENTER</h2>
        <div>보유 자금: <b id="money" style="font-size:1.8rem; color:var(--accent);">0</b> G</div>
    </div>

    <div class="main-container">
        <div id="map-area">
            <div id="battle-map">
                <div id="grid-overlay"></div>
            </div>
        </div>
        <div id="info-panel">
            <div id="panel-content">
                <p style="text-align:center; opacity:0.5; margin-top:100px;">ORN 대륙의 지형을 분석하고<br>작전을 개시하십시오.</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://friendwargme-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let myName = "";
        let selectedId = null;

        const unitIcons = { 'INFANTRY': '🎖️', 'TANK': '🚜', 'ARTILLERY': '💥', 'FIGHTER': '✈️', 'BOMBER': '💣', 'SUBMARINE': '🌊', 'DESTROYER': '🚢', 'BATTLESHIP': '⚓', 'CARRIER': '🛫' };

        window.startGame = function(name) {
            myName = name;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('display-name').innerText = `HQ: ${myName}`;
            
            onValue(ref(db, `players/${myName}/resources/money`), s => {
                document.getElementById('money').innerText = (s.val() || 0).toLocaleString();
            });

            onValue(ref(db, 'provinces'), (snapshot) => {
                const grid = document.getElementById('grid-overlay');
                const data = snapshot.val();
                if (!data) return;
                
                grid.innerHTML = "";
                for(let i=1; i<=256; i++) {
                    const id = `P${i}`;
                    const p = data[id];
                    const tile = document.createElement('div');
                    tile.className = `tile ${p?.owner === myName ? 'me' : ''} ${id === selectedId ? 'selected' : ''}`;
                    
                    tile.innerHTML = `<span class="tile-id">${id}</span>`;
                    
                    if (p && p.unit && p.unit.count > 0) {
                        tile.innerHTML += `
                            <div class="unit-marker">
                                <span style="font-size:1.2rem;">${unitIcons[p.unit.type] || '❓'}</span>
                                <span style="font-size:0.7rem; font-weight:bold;">${p.unit.count}</span>
                            </div>
                        `;
                    }
                    
                    tile.onclick = () => {
                        selectedId = id;
                        updateInfoPanel(p || {id: id, owner: "중립"});
                        document.querySelectorAll('.tile').forEach(t => t.classList.remove('selected'));
                        tile.classList.add('selected');
                    };
                    grid.appendChild(tile);
                }
            });
        };

        function updateInfoPanel(p) {
            const content = document.getElementById('panel-content');
            let ownerColor = p.owner === "서민규" ? "var(--mingyu)" : (p.owner === "박세찬" ? "var(--sechan)" : "var(--manjung)");
            if (p.owner === "중립") ownerColor = "#94a3b8";

            content.innerHTML = `
                <div class="info-header">
                    <h2 style="margin:0; color:${ownerColor}">${p.id} 작전 구역</h2>
                    <small>점령군: ${p.owner || '중립'}</small>
                </div>
                <div class="stat-grid" style="margin-top:1rem;">
                    <div class="stat-item"><b>지형</b><br>${p.terrain || '평지'}</div>
                    <div class="stat-item"><b>인구</b><br>${(p.population || 0).toLocaleString()}</div>
                    <div class="stat-item"><b>주둔군</b><br>${p.unit?.type || '없음'}</div>
                    <div class="stat-item"><b>수량</b><br>${p.unit?.count || 0}</div>
                </div>
                <h3 style="margin-top:1.5rem; border-bottom:1px solid #334155; padding-bottom:5px;">산업 데이터</h3>
                <div class="stat-grid">
                    <div class="stat-item">🏭 군수: ${p.factories?.military || 0}</div>
                    <div class="stat-item">🏗️ 중공업: ${p.factories?.heavy_ind || 0}</div>
                    <div class="stat-item">📦 경공업: ${p.factories?.light_ind || 0}</div>
                    <div class="stat-item">💎 자원: ${p.resources?.type || '없음'}</div>
                </div>
                <div style="margin-top:1.5rem;">
                    <button class="cmd-btn" style="background:#3b82f6" onclick="alert('목표 지점을 지정하세요.')">진격 / 공격 명령</button>
                    <button class="cmd-btn" style="background:#22c55e" onclick="alert('생산 대기열에 추가합니다.')">부대 충원 / 생산</button>
                </div>
            `;
        }
    </script>
</body>
</html>
