<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ORN COMMAND CENTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #38bdf8; --mingyu: #22c55e; --sechan: #3b82f6; --manjung: #ef4444; }
        body { 
            margin: 0; background: #020617; color: #f8fafc; 
            font-family: 'Noto Sans KR', sans-serif; overflow: hidden; 
            display: flex; flex-direction: column; height: 100vh; font-size: 11px; 
            -webkit-user-select: none; user-select: none;
        }

        /* 🚨 보안 게이트: 로그인 오버레이 */
        #login-gate {
            position: fixed; inset: 0; background: #020617; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.5s ease;
        }
        .login-card {
            background: rgba(15, 23, 42, 0.9); padding: 40px; border: 1px solid var(--accent);
            border-radius: 12px; width: 300px; text-align: center;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.15);
        }
        .login-card h2 { font-family: 'Orbitron'; color: var(--accent); margin-bottom: 25px; letter-spacing: 2px; }
        .login-input {
            width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 6px; border: 1px solid #334155;
            background: #0f172a; color: white; box-sizing: border-box; outline: none; font-size: 13px;
        }
        .login-input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(56, 189, 248, 0.3); }
        .login-btn { 
            width: 100%; padding: 14px; background: var(--accent); color: #020617; 
            border: none; border-radius: 6px; font-weight: bold; cursor: pointer; 
            font-family: 'Orbitron'; transition: 0.3s;
        }
        .login-btn:hover { background: #7dd3fc; transform: translateY(-2px); }

        /* 기존 게임 레이아웃 보존 */
        .header { height: 45px; padding: 0 1rem; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; background: #020617; z-index: 2000; }
        .header b { font-family: 'Orbitron'; color: var(--accent); font-size: 16px; }
        .container { display: flex; flex: 1; overflow: hidden; position: relative; }
        #viewport { flex: 1; position: relative; overflow: hidden; background: radial-gradient(#1e293b 1px, transparent 1px); background-size: 30px 30px; cursor: grab; touch-action: none; }
        #map-layer { position: absolute; transform-origin: 0 0; width: 1024px; height: 768px; pointer-events: none; }
        #map-img { width: 100%; height: 100%; background: url('./map.png') no-repeat; background-size: 100% 100%; position: relative; }
        #grid { display: grid; grid-template-columns: repeat(16, 1fr); grid-template-rows: repeat(16, 1fr); width: 100%; height: 100%; pointer-events: auto; }
        .tile { border: 0.1px solid rgba(255,255,255,0.05); box-sizing: border-box; }
        .tile.m { background: rgba(34, 197, 94, 0.1); border: 1px solid var(--mingyu); }
        .tile.s { background: rgba(59, 130, 246, 0.1); border: 1px solid var(--sechan); }
        .tile.mj { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--manjung); }
        #side-panel { width: 300px; background: rgba(15, 23, 42, 0.95); border-left: 1px solid #334155; padding: 20px; backdrop-filter: blur(10px); z-index: 1000; }
        .panel-title { font-family: 'Orbitron'; color: var(--accent); border-bottom: 1px solid #475569; padding-bottom: 10px; margin-bottom: 15px; font-size: 14px; }
        .btn { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 4px; font-weight: bold; color: white; cursor: pointer; text-transform: uppercase; font-size: 10px; }
        .btn-green { background: var(--mingyu); }
        .btn-red { background: var(--manjung); }
    </style>
</head>
<body>

    <div id="login-gate">
        <div class="login-card">
            <h2>COMMANDER LOGIN</h2>
            <input type="text" id="id-input" class="login-input" placeholder="사령관 성함">
            <input type="password" id="pw-input" class="login-input" placeholder="보안 코드">
            <button class="login-btn" onclick="authorize()">ACCESS COMMAND</button>
        </div>
    </div>

    <div class="header">
        <div><span style="font-size:9px; opacity:0.5;">COMMANDER</span> <b id="u-name">-</b></div>
        <div>CREDIT: <b id="u-money">0</b> <span style="font-size:9px;">G</span></div>
    </div>

    <div class="container">
        <div id="viewport">
            <div id="map-layer">
                <div id="map-img"><div id="grid"></div></div>
            </div>
        </div>
        <div id="side-panel"><div id="side-content"><p style="text-align:center; margin-top:100px; opacity:0.2;">섹터를 선택하십시오.</p></div></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://friendwargme-default-rtdb.firebaseio.com/" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myName = "", selId = null, scale = 0.8;
    let px = (window.innerWidth - 300)/2 - (512 * scale), py = window.innerHeight/2 - (384 * scale);
    let isMoving = false;

    // 🚨 절대 보안 로그인 함수
    window.authorize = () => {
        const inputId = document.getElementById('id-input').value.trim();
        const inputPw = document.getElementById('pw-input').value.trim();

        // 사령관 전용 데이터베이스 (여기에 없는 이름은 절대 못 들어감)
        const commanderDB = {
            "서민규": "140625",
            "박세찬": "1234**",
            "김만중": "98765"
        };

        if (commanderDB[inputId] && commanderDB[inputId] === inputPw) {
            myName = inputId;
            document.getElementById('u-name').innerText = inputId;
            const gate = document.getElementById('login-gate');
            gate.style.opacity = "0";
            setTimeout(() => { gate.style.display = "none"; }, 500);
            
            // 승인된 사령관만 게임 엔진 가동
            init(); 
            sync();
        } else {
            alert("신원 확인 실패: 허가되지 않은 접근입니다.");
            document.getElementById('id-input').value = "";
            document.getElementById('pw-input').value = "";
        }
    };

    // --- 기존 게임 로직 보존 ---
    function sync() {
        onValue(ref(db, `players/${myName}/resources/money`), s => {
            document.getElementById('u-money').innerText = Math.floor(s.val()||0).toLocaleString();
        });
        onValue(ref(db, 'provinces'), (snapshot) => {
            const grid = document.getElementById('grid');
            const data = snapshot.val() || {};
            grid.innerHTML = "";
            for(let i=1; i<=256; i++) {
                const id = `P${i}`;
                const p = data[id] || { id: id, owner: "중립", population: 50000 };
                const div = document.createElement('div');
                div.className = `tile ${p.owner.includes("서민규")?'m':p.owner.includes("박세찬")?'s':p.owner.includes("김만중")?'mj':''}`;
                if(id === selId) div.style.boxShadow = "inset 0 0 12px #fff";
                div.onclick = () => { if(isMoving) return; selId = id; updateUI(p); sync(); };
                grid.appendChild(div);
            }
        });
    }

    function updateUI(p) {
        const side = document.getElementById('side-content');
        const isMine = (p.owner === myName);
        side.innerHTML = `
            <div class="panel-title">SECTION ${p.id}</div>
            <div class="row"><span>소유권</span><span>${p.owner}</span></div>
            <div class="row"><span>인구</span><span>${(p.population || 50000).toLocaleString()}명</span></div>
            <button class="btn ${isMine?'btn-green':'btn-red'}" onclick="toggleList()">${isMine?'병력 모집':'공격 개시'}</button>
            <div id="sub-list" style="display:none; margin-top:15px; padding:10px; background:#0f172a; border-radius:5px; border:1px solid var(--accent);">
                <div style="padding:8px; margin-bottom:5px; background:#1e293b; display:flex; justify-content:space-between; cursor:pointer;" onclick="work('보병', 100, 1)"><span>💂 보병</span><span>100G</span></div>
                <div style="padding:8px; margin-bottom:5px; background:#1e293b; display:flex; justify-content:space-between; cursor:pointer;" onclick="work('전차', 500, 3)"><span>🚜 전차</span><span>500G</span></div>
            </div>
        `;
    }

    window.toggleList = () => {
        const l = document.getElementById('sub-list');
        if(l) l.style.display = l.style.display === 'block' ? 'none' : 'block';
    };

    window.work = async (n, c, t) => {
        const mSnap = await get(ref(db, `players/${myName}/resources/money`));
        const money = mSnap.val() || 0;
        if(money < c) return alert("예산 부족!");
        const updates = {};
        updates[`provinces/${selId}/work`] = { name: n, finishAt: Date.now() + (t * 3600000), owner: myName };
        updates[`players/${myName}/resources/money`] = money - c;
        update(ref(db), updates).then(() => alert(`${n} 생산 시작!`));
    };

    function init() {
        const view = document.getElementById('viewport');
        const layer = document.getElementById('map-layer');
        const draw = () => layer.style.transform = `translate(${px}px, ${py}px) scale(${scale})`;
        let active = false, lx, ly, moveDist = 0;
        view.onpointerdown = (e) => { active = true; isMoving = false; moveDist = 0; lx = e.clientX; ly = e.clientY; view.setPointerCapture(e.pointerId); };
        window.onpointermove = (e) => {
            if(!active) return;
            let dx = e.clientX - lx; let dy = e.clientY - ly;
            moveDist += Math.abs(dx) + Math.abs(dy);
            if(moveDist > 5) isMoving = true;
            px += dx; py += dy; lx = e.clientX; ly = e.clientY; draw();
        };
        window.onpointerup = (e) => { active = false; view.releasePointerCapture(e.pointerId); };
        view.onwheel = (e) => { e.preventDefault(); scale -= e.deltaY * 0.0005; scale = Math.min(Math.max(0.1, scale), 3); draw(); };
        draw();
    }
</script>
</body>
</html>
