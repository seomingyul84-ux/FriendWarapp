<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>FriendWarapp - ORN 전략 지휘부</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #020617; --card: rgba(30, 41, 59, 0.9); --accent: #38bdf8; 
            --mingyu: #22c55e; --sechan: #3b82f6; --manjung: #ef4444; 
        }
        body { margin: 0; background: var(--bg); color: #f8fafc; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        /* 🔒 커스텀 로그인 오버레이 */
        #login-overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(15px); }
        .login-box { background: var(--card); padding: 3rem; border-radius: 15px; border: 1px solid #334155; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.5); width: 400px; }
        
        .commander-selector { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .cmd-select-btn { padding: 1rem; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; opacity: 0.6; transition: 0.3s; }
        .cmd-select-btn.active { opacity: 1; transform: scale(1.05); outline: 2px solid white; }

        #pw-input-section { display: none; margin-top: 20px; animation: fadeIn 0.5s; }
        #pw-field { width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 15px; text-align: center; font-size: 1.2rem; }
        #final-login-btn { width: 100%; padding: 12px; border: none; border-radius: 5px; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }

        /* 메인 인터페이스 */
        .header { height: 70px; padding: 0 2rem; background: var(--card); border-bottom: 2px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        #map-area { flex: 1; position: relative; overflow: auto; background: #000; display: flex; align-items: center; justify-content: center; }
        #battle-map { position: relative; width: 1024px; height: 768px; background-image: url('./map.png'); background-size: 100% 100%; border: 4px solid #475569; }
        #grid-overlay { display: grid; grid-template-columns: repeat(16, 1fr); grid-template-rows: repeat(16, 1fr); width: 100%; height: 100%; }

        .tile { border: 0.5px solid rgba(255, 255, 255, 0.05); cursor: pointer; position: relative; }
        .tile.owner-mingyu { background: rgba(34, 197, 94, 0.25); }
        .tile.owner-sechan { background: rgba(59, 130, 246, 0.25); }
        .tile.owner-manjung { background: rgba(239, 68, 68, 0.25); }
        .tile:hover { background: rgba(255, 255, 255, 0.1); border: 1px solid #fff; }
        .tile.selected { outline: 2px solid var(--accent); z-index: 10; box-shadow: inset 0 0 10px var(--accent); }

        #info-panel { width: 380px; background: var(--card); border-left: 2px solid #334155; padding: 1.5rem; }
        .stat-item { background: rgba(15, 23, 42, 0.8); padding: 10px; border-radius: 5px; margin-bottom: 5px; border: 1px solid #334155; font-size: 0.9rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div class="login-box">
            <h1 style="letter-spacing: 5px; margin-bottom: 2rem;">ORN STRATEGY</h1>
            <p style="opacity: 0.7; margin-bottom: 1.5rem;">사령관을 선택하십시오</p>
            
            <div class="commander-selector">
                <button class="cmd-select-btn" style="background:var(--mingyu)" onclick="selectCommander('서민규')">서민규</button>
                <button class="cmd-select-btn" style="background:var(--sechan)" onclick="selectCommander('박세찬')">박세찬</button>
                <button class="cmd-select-btn" style="background:var(--manjung)" onclick="selectCommander('김만중')">김만중</button>
            </div>

            <div id="pw-input-section">
                <input type="password" id="pw-field" placeholder="ACCESS CODE">
                <button id="final-login-btn" onclick="attemptLogin()">지휘부 접속</button>
            </div>
        </div>
    </div>

    <div class="header">
        <h2 id="display-name" style="margin:0; color:var(--accent);">COMMAND CENTER</h2>
        <div>보유 자금: <b id="money" style="font-size:1.8rem; color:var(--accent);">0</b> G</div>
    </div>

    <div class="main-container">
        <div id="map-area"><div id="battle-map"><div id="grid-overlay"></div></div></div>
        <div id="info-panel"><div id="panel-content"><p style="text-align:center; opacity:0.5; margin-top:100px;">작전 지역을 선택하십시오.</p></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://friendwargme-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let selectedCommander = "";
        let myName = "";
        let selectedId = null;
        const passwords = { "서민규": "140625", "박세찬": "1234**", "김만중": "98765" };

        // 사령관 선택 함수
        window.selectCommander = function(name) {
            selectedCommander = name;
            document.querySelectorAll('.cmd-select-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === name);
            });
            document.getElementById('pw-input-section').style.display = 'block';
            document.getElementById('pw-field').focus();
        };

        // 로그인 시도 함수
        window.attemptLogin = function() {
            const inputPw = document.getElementById('pw-field').value;
            if (inputPw === passwords[selectedCommander]) {
                startGame(selectedCommander);
            } else {
                alert("ACCESS DENIED: 비밀번호가 일치하지 않습니다.");
                document.getElementById('pw-field').value = "";
            }
        };

        function startGame(name) {
            myName = name;
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('display-name').innerText = `HQ: ${myName}`;
            
            onValue(ref(db, `players/${myName}/resources/money`), s => {
                document.getElementById('money').innerText = (s.val() || 0).toLocaleString();
            });

            onValue(ref(db, 'provinces'), (snapshot) => {
                const grid = document.getElementById('grid-overlay');
                const data = snapshot.val() || {};
                grid.innerHTML = "";
                
                for(let i=1; i<=256; i++) {
                    const id = `P${i}`;
                    const p = data[id] || {id: id, owner: "중립", terrain: "바다"};
                    const tile = document.createElement('div');
                    
                    let ownerClass = p.owner === "서민규" ? "owner-mingyu" : (p.owner === "박세찬" ? "owner-sechan" : (p.owner === "김만중" ? "owner-manjung" : ""));
                    tile.className = `tile ${ownerClass} ${id === selectedId ? 'selected' : ''}`;
                    tile.innerHTML = `<span style="font-size:0.5rem; position:absolute; top:2px; left:2px; opacity:0.3;">${id}</span>`;
                    
                    if (p.unit && p.unit.count > 0) {
                        tile.innerHTML += `<div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; font-weight:bold; font-size:0.8rem;">🎖️${p.unit.count}</div>`;
                    }
                    
                    tile.onclick = () => {
                        selectedId = id;
                        updateInfoPanel(p);
                        document.querySelectorAll('.tile').forEach(t => t.classList.remove('selected'));
                        tile.classList.add('selected');
                    };
                    grid.appendChild(tile);
                }
            });
        }

        function updateInfoPanel(p) {
            const content = document.getElementById('panel-content');
            content.innerHTML = `
                <h2 style="color:var(--accent)">${p.id} 작전 구역</h2>
                <div class="stat-item"><b>지형:</b> ${p.terrain || '바다'}</div>
                <div class="stat-item"><b>소유:</b> ${p.owner || '중립'}</div>
                <div class="stat-item"><b>인구:</b> ${(p.population || 0).toLocaleString()}</div>
                <div class="stat-item"><b>주둔 부대:</b> ${p.unit?.type || '없음'} (${p.unit?.count || 0})</div>
                <button style="width:100%; padding:15px; margin-top:20px; background:var(--accent); border:none; color:white; font-weight:bold; cursor:pointer;" onclick="alert('명령 하달 중...')">전투 개시</button>
            `;
        }
    </script>
</body>
</html>
