<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>FriendWarapp - 전장 상황실</title>
    <style>
        body { margin: 0; background: #222; color: white; font-family: 'Malgun Gothic', sans-serif; text-align: center; }
        .status-bar { background: #333; padding: 20px; border-bottom: 2px solid #444; }
        #map { display: grid; grid-template-columns: repeat(5, 120px); gap: 10px; justify-content: center; margin: 20px; }
        .province { width: 120px; height: 120px; border: 2px solid #555; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; transition: 0.3s; }
        .owner-me { background: #2e7d32; border-color: #4caf50; }
        .owner-enemy { background: #c62828; border-color: #ef5350; }
        .owner-none { background: #444; }
    </style>
</head>
<body>
    <div class="status-bar">
        <h1>FriendWarapp 상황판</h1>
        <p>상태: <span id="server-status">연결 중...</span> | 자금: <span id="money">0</span>G</p>
    </div>

    <div id="map"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // 사령관님의 Firebase 설정 (콘솔에서 확인한 설정값을 넣으세요!)
        const firebaseConfig = {
            databaseURL: "https://friendwargme-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 서버(Render) 상태 체크
        fetch("https://friendwarapp.onrender.com")
            .then(() => document.getElementById('server-status').innerText = "서버 가동 중 ✅")
            .catch(() => document.getElementById('server-status').innerText = "서버 연결 실패 ❌");

        // 지도 실시간 업데이트
        const mapDiv = document.getElementById('map');
        onValue(ref(db, 'provinces'), (snapshot) => {
            const data = snapshot.val();
            mapDiv.innerHTML = ""; // 기존 지도 초기화
            
            for (let id in data) {
                const prov = data[id];
                const div = document.createElement('div');
                div.className = `province ${prov.owner ? 'owner-enemy' : 'owner-none'}`;
                div.innerHTML = `<b>${id}</b><br>${prov.type}<br>병력: ${prov.units || 0}`;
                mapDiv.appendChild(div);
            }
        });
    </script>
</body>
</html>
