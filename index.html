<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FriendWarapp - ORN 전략 지휘부</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #020617; --card: rgba(30, 41, 59, 0.9); --accent: #38bdf8; 
            --mingyu: #22c55e; --sechan: #3b82f6; --manjung: #ef4444; 
        }
        body { margin: 0; background: var(--bg); color: #f8fafc; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; font-size: 11px; }
        
        .header { height: 40px; padding: 0 1rem; background: var(--card); border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .main-container { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* 맵 가시 영역 */
        #map-viewport { flex: 1; position: relative; overflow: hidden; background: #000; touch-action: none; cursor: grab; }
        #map-viewport:active { cursor: grabbing; }

        /* 지도 레이어 - scale 변화를 부드럽게 */
        #map-layer { 
            position: absolute; transform-origin: 0 0; 
            width: 1024px; height: 768px;
            transition: transform 0.05s linear; 
        }
        #battle-map { width: 100%; height: 100%; background-image: url('./map.png'); background-size: 100% 100%; position: relative; }
        #grid-overlay { display: grid; grid-template-columns: repeat(16, 1fr); grid-template-rows: repeat(16, 1fr); width: 100%; height: 100%; }

        /* 타일 및 유닛 */
        .tile { border: 0.1px solid rgba(255, 255, 255, 0.05); position: relative; cursor: pointer; }
        .tile.owner-mingyu { background: rgba(34, 197, 94, 0.2); }
        .tile.owner-sechan { background: rgba(59, 130, 246, 0.2); }
        .tile.owner-manjung { background: rgba(239, 68, 68, 0.2); }
        .unit-badge { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; text-shadow: 0 0 3px #000; pointer-events: none; }

        /* 컨트롤 UI */
        .zoom-ctrl { position: absolute; bottom: 15px; left: 15px; display: flex; flex-direction: column; gap: 5px; z-index: 1000; }
        .z-btn { width: 35px; height: 35px; background: var(--card); border: 1px solid var(--accent); color: white; border-radius: 4px; font-weight: bold; cursor: pointer; }

        #info-panel { width: 220px; background: var(--card); border-left: 1px solid #334155; padding: 1rem; overflow-y: auto; z-index: 1000; }
        .cmd-btn { width: 100%; margin-top: 5px; padding: 8px; border: none; border-radius: 3px; font-weight: bold; cursor: pointer; color: white; font-size: 11px; }

        #overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        .login-btn { padding: 1rem 3rem; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; margin-bottom: 10px; width: 250px; }
    </style>
</head>
<body>
    <div id="overlay">
        <h3 style="letter-spacing: 5px; color: var(--accent);">ORN STRATEGY</h3>
        <div class="btn-group">
            <button class="login-btn" style="background:var(--mingyu)" onclick="login('서민규')">서민규</button>
            <button class="login-btn" style="background:var(--sechan)" onclick="login('박세찬')">박세찬</button>
            <button class="login-btn" style="background:var(--manjung)" onclick="login('김만중')">김만중</button>
        </div>
    </div>

    <div class="header">
        <div id="display-name" style="font-weight:bold; color:var(--accent);">HQ</div>
        <div>예산: <b id="money" style="color:var(--accent);">0</b> G</div>
    </div>

    <div class="main-container">
        <div id="map-viewport">
            <div id="map-layer">
                <div id="battle-map"><div id="grid-overlay"></div></div>
            </div>
            <div class="zoom-ctrl">
                <button class="z-btn" onclick="manualZoom(1.1)">+</button>
                <button class="z-btn" onclick="manualZoom(0.9)">-</button>
                <button class="z-btn" onclick="resetView()" style="font-size:10px;">Reset</button>
            </div>
        </div>
        <div id="info-panel"><div id="panel-content">구역 선택</div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://friendwargme-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myName = "", selectedId = null, scale = 0.7, posX = 10, posY = 10;
        const passwords = { "서민규": "140625", "박세찬": "1234**", "김만중": "98765" };

        window.login = (user) => {
            const pw = prompt(`${user} 사령관님, 보안 코드를 입력하십시오.`);
            if (pw === passwords[user]) {
                myName = user;
                document.getElementById('overlay').style.display = 'none';
                initInteraction();
                syncData();
            }
        };

        function syncData() {
            onValue(ref(db, `players/${myName}/resources/money`), s => {
                document.getElementById('money').innerText = Math.floor(s.val() || 0).toLocaleString();
            });

            onValue(ref(db, 'provinces'), (snapshot) => {
                const grid = document.getElementById('grid-overlay');
                const data = snapshot.val() || {};
                grid.innerHTML = "";

                for(let i=1; i<=256; i++) {
                    const id = `P${i}`;
                    const p = data[id] || { id: id, owner: "중립", population: 50000 };
                    const tile = document.createElement('div');
                    let ownerStr = String(p.owner || "중립");
                    let ownerClass = ownerStr.includes("서민규") ? "owner-mingyu" : (ownerStr.includes("박세찬") ? "owner-sechan" : (ownerStr.includes("김만중") ? "owner-manjung" : ""));

                    tile.className = `tile ${ownerClass}`;
                    if(id === selectedId) tile.style.boxShadow = "inset 0 0 10px var(--accent)";
                    tile.innerHTML = `<span style="font-size:7px; opacity:0.2; position:absolute; top:1px; left:1px;">${id}</span>`;
                    if (p.unit?.count > 0) tile.innerHTML += `<div class="unit-badge">🎖️${p.unit.count}</div>`;

                    tile.onclick = (e) => {
                        e.stopPropagation(); // 맵 드래그와 클릭 분리
                        selectedId = id;
                        updateInfoPanel(p);
                        syncData(); 
                    };
                    grid.appendChild(tile);
                }
            });
        }

        function initInteraction() {
            const viewport = document.getElementById('map-viewport');
            const layer = document.getElementById('map-layer');

            const applyTransform = () => {
                layer.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
            };

            // 1. 드래그 시스템 (클릭 미스 방지 포함)
            let isDragging = false, startX, startY, moved = false;
            const onStart = (e) => {
                isDragging = true; moved = false;
                const touch = e.touches ? e.touches[0] : e;
                startX = touch.clientX - posX; startY = touch.clientY - posY;
            };
            const onMove = (e) => {
                if (!isDragging) return;
                moved = true;
                const touch = e.touches ? e.touches[0] : e;
                posX = touch.clientX - startX;
                posY = touch.clientY - startY;
                applyTransform();
            };
            const onEnd = () => isDragging = false;

            viewport.addEventListener('mousedown', onStart);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onEnd);
            viewport.addEventListener('touchstart', onStart);
            viewport.addEventListener('touchmove', onMove);
            viewport.addEventListener('touchend', onEnd);

            // 2. 휠 감도 대폭 하향 (0.01 단위로 정밀 조절)
            viewport.addEventListener('wheel', (e) => {
                e.preventDefault();
                const zoomSpeed = 0.001; // 숫자가 작을수록 부드러움
                scale -= e.deltaY * zoomSpeed;
                scale = Math.min(Math.max(0.2, scale), 3);
                applyTransform();
            }, {passive: false});

            window.manualZoom = (amt) => { scale *= amt; scale = Math.min(Math.max(0.2, scale), 3); applyTransform(); };
            window.resetView = () => { scale = 0.7; posX = 10; posY = 10; applyTransform(); };
            applyTransform();
        }

        function updateInfoPanel(p) {
            document.getElementById('panel-content').innerHTML = `
                <h4 style="margin:0; color:var(--accent);">${p.id}</h4>
                <p>인구: ${(p.population || 50000).toLocaleString()}</p>
                <p>소유: ${p.owner || '중립'}</p>
                <button class="cmd-btn" style="background:var(--mingyu)" onclick="alert('모집 준비')">군사 모집</button>
                <button class="cmd-btn" style="background:#8b5cf6" onclick="alert('건설 준비')">시설 건설</button>
            `;
        }
    </script>
</body>
</html>
