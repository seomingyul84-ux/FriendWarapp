<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>FriendWarapp - 전략 지휘 통제실</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; 
            --mingyu: #22c55e; --sechan: #3b82f6; --manjung: #ef4444; 
            --tile-light: #2d3748; --tile-dark: #1a202c;
        }
        body { margin: 0; background: var(--bg); color: #f8fafc; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        /* 시작 오버레이 */
        #overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .btn-group button { padding: 1.5rem 3rem; margin: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1.2rem; color: white; }
        .btn-m { background: var(--mingyu); } .btn-s { background: var(--sechan); } .btn-j { background: var(--manjung); }

        /* 헤더 */
        .header { height: 70px; padding: 0 2rem; background: var(--card); border-bottom: 2px solid #334155; display: flex; justify-content: space-between; align-items: center; z-index: 500; box-sizing: border-box; flex-shrink: 0; }

        /* 메인 레이아웃 */
        .main-container { display: flex; flex: 1; overflow: hidden; }
        
        /* ⚠️ 16x16 보드판 교정: 가득 차게 보이도록 수정 */
        #map-wrapper { flex: 1; overflow: auto; background: #0b1121; padding: 10px; display: flex; justify-content: center; }
        #map { 
            display: grid; 
            grid-template-columns: repeat(16, minmax(40px, 1fr)); /* 최소 크기 보장 */
            gap: 1px; 
            background: #334155;
            width: fit-content;
            height: fit-content;
        }

        .tile { 
            width: 45px; height: 45px; /* 타일 크기 고정으로 4분할 방지 */
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.1s; position: relative; font-family: 'Roboto Condensed', sans-serif;
        }
        .tile:nth-child(even) { background: var(--tile-light); }
        .tile:nth-child(odd) { background: var(--tile-dark); }
        .tile:hover { filter: brightness(1.5); outline: 2px solid white; z-index: 10; }
        .tile.me { outline: 2px solid var(--accent); z-index: 5; }
        .tile.selected { outline: 3px solid white; z-index: 15; box-shadow: 0 0 15px var(--accent); }

        .tile-id { font-size: 0.5rem; position: absolute; top: 2px; left: 2px; opacity: 0.5; }
        .unit-abbr { font-size: 0.8rem; font-weight: bold; }
        .unit-count { font-size: 0.7rem; color: var(--accent); }

        /* 정보 패널 */
        #info-panel { 
            width: 350px; background: var(--card); border-left: 2px solid #334155; 
            padding: 1.5rem; box-sizing: border-box; overflow-y: auto; flex-shrink: 0;
        }
        .info-header { border-bottom: 1px solid #475569; padding-bottom: 1rem; margin-bottom: 1rem; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.85rem; }
        .stat-item { background: #0f172a; padding: 8px; border-radius: 5px; }
        
        .cmd-btn { width: 100%; margin-top: 10px; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        .btn-move { background: var(--sechan); }
        .btn-deploy { background: var(--mingyu); }
    </style>
</head>
<body>
    <div id="overlay">
        <h1>지휘관을 선택하십시오</h1>
        <div class="btn-group">
            <button class="btn-m" onclick="startGame('서민규')">서민규</button>
            <button class="btn-s" onclick="startGame('박세찬')">박세찬</button>
            <button class="btn-j" onclick="startGame('김만중')">김만중</button>
        </div>
    </div>

    <div class="header">
        <h2 id="display-name" style="margin:0; color:var(--accent);">작전 대기 중...</h2>
        <div>보유 자금: <b id="money" style="font-size:1.5rem; color:var(--accent);">0</b> G</div>
    </div>

    <div class="main-container">
        <div id="map-wrapper">
            <div id="map"></div>
        </div>
        <div id="info-panel">
            <div id="panel-content">
                <p style="text-align:center; opacity:0.5; margin-top:100px;">타일을 선택하여 상세 정보를 확인하십시오.</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://friendwargme-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let myName = "";
        let selectedId = null;

        const unitAbbr = { 'INFANTRY': 'INF', 'TANK': 'TNK', 'ARTILLERY': 'ART', 'FIGHTER': 'FTR', 'BOMBER': 'BMR', 'SUBMARINE': 'SUB', 'DESTROYER': 'DD', 'BATTLESHIP': 'BB', 'CARRIER': 'CV' };

        window.startGame = function(name) {
            myName = name;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('display-name').innerText = `지휘관: ${myName}`;
            
            onValue(ref(db, `players/${myName}/resources/money`), s => {
                document.getElementById('money').innerText = (s.val() || 0).toLocaleString();
            });

            onValue(ref(db, 'provinces'), (snapshot) => {
                const mapDiv = document.getElementById('map');
                const data = snapshot.val();
                if (!data) return;
                
                mapDiv.innerHTML = "";
                const sortedKeys = Object.keys(data).sort((a, b) => parseInt(a.slice(1)) - parseInt(b.slice(1)));
                
                sortedKeys.forEach(id => {
                    const p = data[id];
                    const tile = document.createElement('div');
                    tile.className = `tile ${p.owner === myName ? 'me' : ''} ${id === selectedId ? 'selected' : ''}`;
                    
                    let ownerColor = p.owner === "서민규" ? "var(--mingyu)" : (p.owner === "박세찬" ? "var(--sechan)" : (p.owner === "김만중" ? "var(--manjung)" : "transparent"));
                    tile.style.borderBottom = `4px solid ${ownerColor}`;

                    tile.innerHTML = `
                        <span class="tile-id">${id}</span>
                        <span class="unit-abbr">${unitAbbr[p.unit?.type] || ''}</span>
                        <span class="unit-count">${p.unit?.count || 0}</span>
                    `;
                    
                    tile.onclick = () => {
                        selectedId = id;
                        updateInfoPanel(p);
                        // 새로고침 시 선택 효과 유지를 위해 모든 타일 클래스 갱신 대신 데이터 기반 재렌더링 활용
                    };
                    mapDiv.appendChild(tile);
                });
            });
        };

        function updateInfoPanel(p) {
            const content = document.getElementById('panel-content');
            let color = p.owner === "서민규" ? "var(--mingyu)" : (p.owner === "박세찬" ? "var(--sechan)" : "var(--manjung)");
            if (p.owner === "중립") color = "#94a3b8";

            content.innerHTML = `
                <div class="info-header">
                    <h2 style="margin:0; color:${color}">${p.id} 영지</h2>
                    <small>점령 주체: ${p.owner || '중립'}</small>
                </div>
                <div class="stat-grid">
                    <div class="stat-item"><b>지형</b><br>${p.terrain || '평지'}</div>
                    <div class="stat-item"><b>인구</b><br>${(p.population || 0).toLocaleString()}</div>
                    <div class="stat-item"><b>기물</b><br>${p.unit?.type || '없음'}</div>
                    <div class="stat-item"><b>수량</b><br>${p.unit?.count || 0}</div>
                </div>
                <h3 style="margin-top:1.5rem; border-bottom:1px solid #334155;">산업 시설</h3>
                <div class="stat-grid">
                    <div class="stat-item">🏭 군수: ${p.factories?.military || 0}</div>
                    <div class="stat-item">🏗️ 중공업: ${p.factories?.heavy_ind || 0}</div>
                    <div class="stat-item">📦 경공업: ${p.factories?.light_ind || 0}</div>
                    <div class="stat-item">💎 자원: ${p.resources?.type || '없음'}</div>
                </div>
                
                <div style="margin-top:1.5rem;">
                    <button class="cmd-btn btn-move" onclick="executeCommand('MOVE', '${p.id}')">병력 이동 / 공격</button>
                    <button class="cmd-btn btn-deploy" onclick="executeCommand('DEPLOY', '${p.id}')">유닛 즉시 생산</button>
                </div>
            `;
        }

        window.executeCommand = function(type, id) {
            if (type === 'MOVE') {
                const target = prompt("진격할 목표 타일 ID를 입력하세요 (예: P15)");
                if (target) alert(`${id}에서 ${target}로 진격 명령을 하달했습니다!`);
            } else {
                alert(`${id} 영지에서 유닛 생산 프로세스를 가동합니다.`);
            }
        };
    </script>
</body>
</html>
