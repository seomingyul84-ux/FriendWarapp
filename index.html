<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>FriendWarapp - FINAL CALIBRATION</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --accent: #38bdf8; --mingyu: #22c55e; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        #login-gate { position: fixed; inset: 0; background: #020617; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: #0f172a; padding: 30px; border: 2px solid var(--accent); border-radius: 12px; text-align: center; }
        
        .header { height: 50px; border-bottom: 1px solid var(--accent); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; background: #020617; }
        .container { display: flex; flex: 1; overflow: hidden; }
        
        /* 맵 컨테이너 */
        #viewport { flex: 1; position: relative; overflow: hidden; background: #000; cursor: crosshair; }
        #map-wrapper { position: absolute; transform-origin: 0 0; width: 1024px; height: 768px; }
        #map-img { position: absolute; inset: 0; background: url('map.png') no-repeat; background-size: 100% 100%; pointer-events: none; }
        
        /* 🚨 실질적인 클릭을 받는 투명 레이어 (최상단) */
        #click-surface { position: absolute; inset: 0; z-index: 500; pointer-events: auto; }
        
        /* 섹터 강조용 캔버스 (선택된 칸 표시) */
        #highlight-layer { position: absolute; inset: 0; z-index: 400; pointer-events: none; display: grid; grid-template-columns: repeat(16, 1fr); grid-template-rows: repeat(16, 1fr); }
        .tile-unit { border: 0.1px solid rgba(255,255,255,0.05); box-sizing: border-box; }
        .tile-unit.selected { border: 3px solid #fff; background: rgba(255,255,255,0.2); box-shadow: inset 0 0 10px #fff; }

        /* 패널 */
        #side-panel { width: 320px; background: #0f172a; border-left: 1px solid var(--accent); padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .action-btn { width: 100%; padding: 12px; margin-top: 10px; background: #1e293b; color: #fff; border: 1px solid var(--accent); cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-gate">
    <div class="login-box">
        <h2 style="color:var(--accent)">COMMANDER AUTH</h2>
        <input type="text" id="u-id" placeholder="사령관명" value="서민규" style="display:block; width:200px; margin-bottom:10px; padding:10px;">
        <input type="password" id="u-pw" placeholder="보안코드" value="140625" style="display:block; width:200px; margin-bottom:10px; padding:10px;">
        <button onclick="login()" style="width:224px; padding:10px; background:var(--accent); border:none; font-weight:bold; cursor:pointer;">CONNECT</button>
    </div>
</div>

<div class="header">
    <div>COMMANDER: <b id="disp-name">---</b></div>
    <div>CREDIT: <b id="disp-money" style="color:var(--mingyu)">0</b> G</div>
</div>

<div class="container">
    <div id="viewport">
        <div id="map-wrapper">
            <div id="map-img"></div>
            <div id="highlight-layer"></div>
            <div id="click-surface"></div>
        </div>
    </div>
    <div id="side-panel">
        <div id="side-content">
            <p style="text-align:center; opacity:0.5; margin-top:100px;">섹터를 터치하여 작전을 수립하십시오.</p>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://friendwargme-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName = "", selId = null, scale = 1.0, px = 0, py = 0, isMoving = false;

    function login() {
        const id = document.getElementById('u-id').value;
        const pw = document.getElementById('u-pw').value;
        if(id === "서민규" && pw === "140625") {
            myName = id;
            document.getElementById('disp-name').innerText = id;
            document.getElementById('login-gate').style.display = "none";
            startEngine();
        } else { alert("신원 확인 불가"); }
    }

    function startEngine() {
        console.log("ENGINE START: ANALYZING COORDINATES...");
        
        // 하이라이트 레이어 초기화 (256칸)
        const hl = document.getElementById('highlight-layer');
        hl.innerHTML = "";
        for(let i=1; i<=256; i++) {
            const d = document.createElement('div');
            d.className = 'tile-unit';
            d.id = 'hl-P' + i;
            hl.appendChild(d);
        }

        // 🚨 좌표 기반 클릭 엔진
        const surface = document.getElementById('click-surface');
        surface.onmousedown = function(e) { isMoving = false; };
        
        surface.onclick = function(e) {
            if (isMoving) return;
            
            const rect = surface.getBoundingClientRect();
            // 현재 화면상의 클릭 좌표를 격자판의 실제 크기로 변환
            const x = (e.clientX - rect.left) / scale;
            const y = (e.clientY - rect.top) / scale;
            
            const col = Math.floor((x / 1024) * 16);
            const row = Math.floor((y / 768) * 16);
            
            if (col >= 0 && col < 16 && row >= 0 && row < 16) {
                const index = row * 16 + col + 1;
                const targetId = "P" + index;
                console.log("🎯 좌표 타격 성공: " + targetId + " (X:" + Math.round(x) + ", Y:" + Math.round(y) + ")");
                processSector(targetId);
            }
        };

        // 실시간 돈 동기화
        db.ref('players/' + myName + '/resources/money').on('value', s => {
            document.getElementById('disp-money').innerText = Math.floor(s.val() || 0).toLocaleString();
        });

        initMapMovement();
    }

    function processSector(id) {
        selId = id;
        // 시각적 강조
        const units = document.getElementsByClassName('tile-unit');
        for(let u of units) u.classList.remove('selected');
        document.getElementById('hl-' + id).classList.add('selected');

        // 패널 업데이트
        const side = document.getElementById('side-content');
        side.innerHTML = "<h4>데이터 통신 중...</h4>";

        db.ref('provinces/' + id).once('value').then(snap => {
            const data = snap.val() || { owner: "중립", population: 50000 };
            side.innerHTML = `
                <h2 style="color:var(--accent)">SECTION ${id}</h2>
                <div style="margin:15px 0; border:1px solid #334155; padding:15px; border-radius:8px; background:#1e293b;">
                    <p style="margin:5px 0;">점유: <b>${data.owner}</b></p>
                    <p style="margin:5px 0;">인구: <b>${(data.population||50000).toLocaleString()}명</b></p>
                </div>
                <div style="margin-top:30px;">
                    <p style="font-size:12px; color:var(--accent);">[ 지상군 통제 ]</p>
                    <button class="action-btn" onclick="alert('병력 모집 중...')">💂 병력 모집 (100G)</button>
                    <p style="font-size:12px; color:var(--accent); margin-top:20px;">[ 인프라 건설 ]</p>
                    <button class="action-btn" onclick="alert('시설 건설 중...')">🏢 시설 건설 (500G)</button>
                </div>
            `;
        });
    }

    function initMapMovement() {
        const view = document.getElementById('viewport'), wrapper = document.getElementById('map-wrapper');
        const draw = () => wrapper.style.transform = `translate(${px}px, ${py}px) scale(${scale})`;
        let active = false, lx, ly;

        view.onpointerdown = e => { active = true; lx = e.clientX; ly = e.clientY; view.setPointerCapture(e.pointerId); };
        window.onpointermove = e => {
            if (!active) return;
            let dx = e.clientX - lx, dy = e.clientY - ly;
            if (Math.abs(dx) > 5 || Math.abs(dy) > 5) isMoving = true;
            px += dx; py += dy; lx = e.clientX; ly = e.clientY; draw();
        };
        window.onpointerup = () => active = false;
        view.onwheel = e => { 
            const speed = 0.001;
            scale -= e.deltaY * speed; 
            scale = Math.min(Math.max(0.3, scale), 3); 
            draw(); 
        };
        
        px = (view.clientWidth - 1024) / 2; py = (view.clientHeight - 768) / 2;
        draw();
    }
</script>
</body>
</html>
