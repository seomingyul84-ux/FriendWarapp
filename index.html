<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORN COMMAND - 무제한 기동 시스템</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #020617; --card: rgba(15, 23, 42, 0.9); --accent: #38bdf8; 
            --mingyu: #22c55e; --sechan: #3b82f6; --manjung: #ef4444; 
        }
        body { margin: 0; background: var(--bg); color: #f8fafc; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; font-size: 11px; }
        
        .header { height: 45px; padding: 0 1rem; background: #020617; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; z-index: 2000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .header b { font-family: 'Orbitron', sans-serif; color: var(--accent); }

        .main-container { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* 🛰️ 무제한 뷰포트 설정 */
        #map-viewport { flex: 1; position: relative; overflow: hidden; background: radial-gradient(circle, #1e293b 1px, transparent 1px); background-size: 50px 50px; touch-action: none; cursor: grab; }
        #map-viewport:active { cursor: grabbing; }
        
        /* 🗺️ 자유 이동 레이어 */
        #map-layer { 
            position: absolute; transform-origin: center; 
            width: 1024px; height: 768px;
            will-change: transform;
            transition: transform 0.05s ease-out;
        }

        #battle-map { width: 100%; height: 100%; background-image: url('./map.png'); background-size: 100% 100%; position: relative; box-shadow: 0 0 50px rgba(0,0,0,1); }
        #grid-overlay { display: grid; grid-template-columns: repeat(16, 1fr); grid-template-rows: repeat(16, 1fr); width: 100%; height: 100%; }

        /* 타일 가시성 */
        .tile { border: 0.1px solid rgba(255,255,255,0.05); position: relative; }
        .tile.owner-mingyu { background: rgba(34, 197, 94, 0.1); border: 0.2px solid var(--mingyu); }
        .tile.owner-sechan { background: rgba(59, 130, 246, 0.1); border: 0.2px solid var(--sechan); }
        .tile.owner-manjung { background: rgba(239, 68, 68, 0.1); border: 0.2px solid var(--manjung); }
        .unit-badge { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; text-shadow: 0 0 5px #000; pointer-events: none; }

        /* 컨트롤 및 패널 */
        .zoom-ctrl { position: absolute; bottom: 20px; left: 20px; display: flex; gap: 8px; z-index: 2000; }
        .z-btn { width: 45px; height: 45px; background: #020617; border: 1px solid var(--accent); color: white; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        #info-panel { width: 300px; background: var(--card); border-left: 2px solid #334155; padding: 1.2rem; overflow-y: auto; z-index: 2000; backdrop-filter: blur(15px); }
        .cmd-btn { width: 100%; padding: 12px; margin-top: 8px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; font-size: 11px; text-transform: uppercase; }

        #overlay { position: fixed; inset: 0; background: #020617; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; }
    </style>
</head>
<body>
    <div id="overlay">
        <h1 style="font-family:'Orbitron'; letter-spacing:10px; color:var(--accent);">ORN COMMAND</h1>
        <div style="display:flex; flex-direction:column; gap:10px;">
            <button class="cmd-btn" style="background:var(--mingyu); width:250px;" onclick="login('서민규')">서민규 지휘권 승인</button>
            <button class="cmd-btn" style="background:var(--sechan); width:250px;" onclick="login('박세찬')">박세찬 지휘권 승인</button>
            <button class="cmd-btn" style="background:var(--manjung); width:250px;" onclick="login('김만중')">김만중 지휘권 승인</button>
        </div>
    </div>

    <div class="header">
        <div><b id="user-name">-</b> 사령관 상시 대기 중</div>
        <div>CREDIT: <b id="money">0</b> <span style="font-size:9px; color:#94a3b8;">G</span></div>
    </div>

    <div class="main-container">
        <div id="map-viewport">
            <div id="map-layer">
                <div id="battle-map"><div id="grid-overlay"></div></div>
            </div>
            <div class="zoom-ctrl">
                <button class="z-btn" onclick="manualZoom(1.2)">+</button>
                <button class="z-btn" onclick="manualZoom(0.8)">-</button>
                <button class="z-btn" onclick="resetView()">🎯</button>
            </div>
        </div>
        <div id="info-panel"><div id="panel-content"><p style="text-align:center; margin-top:100px; opacity:0.3;">섹터를 선택하여<br>데이터를 수신하십시오.</p></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://friendwargme-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myName = "", selectedId = null, scale = 0.8;
        // 🛰️ 좌표 시스템 개선 (화면 중앙 기준)
        let posX = window.innerWidth / 2 - 512; 
        let posY = window.innerHeight / 2 - 384;

        window.login = (user) => {
            const pw = prompt(`${user} 사령관님, 코드를 입력하십시오.`);
            if (pw === "140625" || pw === "1234**" || pw === "98765") { // 간소화된 체크
                myName = user;
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('user-name').innerText = myName;
                initNavigation();
                syncData();
            }
        };

        function syncData() {
            onValue(ref(db, `players/${myName}/resources/money`), s => {
                document.getElementById('money').innerText = Math.floor(s.val() || 0).toLocaleString();
            });
            onValue(ref(db, 'provinces'), (snapshot) => {
                const grid = document.getElementById('grid-overlay');
                const data = snapshot.val() || {};
                grid.innerHTML = "";
                for(let i=1; i<=256; i++) {
                    const id = `P${i}`;
                    const p = data[id] || { id: id, owner: "중립" };
                    const tile = document.createElement('div');
                    let o = p.owner || "중립";
                    tile.className = `tile ${o.includes("서민규")?"owner-mingyu":o.includes("박세찬")?"owner-sechan":o.includes("김만중")?"owner-manjung":""}`;
                    if(id === selectedId) tile.style.boxShadow = "inset 0 0 10px white";
                    if (p.unit?.count > 0) tile.innerHTML = `<div class="unit-badge">🎖️</div>`;
                    tile.onclick = (e) => { e.stopPropagation(); selectedId = id; updateInfoPanel(p); syncData(); };
                    grid.appendChild(tile);
                }
            });
        }

        function initNavigation() {
            const viewport = document.getElementById('map-viewport');
            const layer = document.getElementById('map-layer');
            const apply = () => {
                layer.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
            };

            let isMoving = false, lastX, lastY;

            // 🖱️ 자유 드래그 (상하좌우 무제한)
            viewport.onmousedown = (e) => { isMoving = true; lastX = e.clientX; lastY = e.clientY; };
            window.onmousemove = (e) => {
                if(!isMoving) return;
                posX += (e.clientX - lastX);
                posY += (e.clientY - lastY);
                lastX = e.clientX; lastY = e.clientY;
                apply();
            };
            window.onmouseup = () => isMoving = false;

            // 📱 모바일 터치 드래그 지원
            viewport.ontouchstart = (e) => { isMoving = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; };
            viewport.ontouchmove = (e) => {
                if(!isMoving) return;
                posX += (e.touches[0].clientX - lastX);
                posY += (e.touches[0].clientY - lastY);
                lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
                apply();
            };
            viewport.ontouchend = () => isMoving = false;

            // 🎡 휠 줌 (부드러운 감도)
            viewport.onwheel = (e) => {
                e.preventDefault();
                const zoomFactor = 0.0005;
                const oldScale = scale;
                scale -= e.deltaY * zoomFactor;
                scale = Math.min(Math.max(0.1, scale), 5); // 0.1배에서 5배까지 자유롭게
                apply();
            };

            window.manualZoom = (amt) => { scale *= amt; apply(); };
            window.resetView = () => { 
                scale = 0.8; 
                posX = viewport.clientWidth / 2 - (512 * scale); 
                posY = viewport.clientHeight / 2 - (384 * scale); 
                apply(); 
            };
            
            window.resetView(); // 시작 시 중앙 정렬
        }

        function updateInfoPanel(p) {
            document.getElementById('panel-content').innerHTML = `
                <h3 style="color:var(--accent); font-family:'Orbitron';">SECTION ${p.id}</h3>
                <p>소유주: ${p.owner || '중립'}</p>
                <p>인구: ${(p.population || 50000).toLocaleString()}</p>
                <button class="cmd-btn" style="background:var(--mingyu)">작전 명령 하달</button>
            `;
        }
    </script>
</body>
</html>
