<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FriendWarapp - ORN 전략 지휘부</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #020617; --card: rgba(30, 41, 59, 0.9); --accent: #38bdf8; 
            --mingyu: #22c55e; --sechan: #3b82f6; --manjung: #ef4444; 
        }
        body { margin: 0; background: var(--bg); color: #f8fafc; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; font-size: 12px; }
        
        /* 헤더 */
        .header { height: 50px; padding: 0 1rem; background: var(--card); border-bottom: 2px solid #334155; display: flex; justify-content: space-between; align-items: center; z-index: 500; }
        
        /* 메인 레이아웃 */
        .main-container { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* 맵 가시 영역 */
        #map-viewport { flex: 1; position: relative; overflow: hidden; background: #000; touch-action: none; cursor: grab; }
        #map-viewport:active { cursor: grabbing; }

        /* 실제 움직이는 지도 레이어 */
        #map-layer { 
            position: absolute; transform-origin: 0 0; 
            width: 1024px; height: 768px;
            will-change: transform;
        }
        #battle-map { 
            width: 100%; height: 100%; 
            background-image: url('./map.png'); background-size: 100% 100%; 
            border: 2px solid #475569; position: relative;
        }
        #grid-overlay { display: grid; grid-template-columns: repeat(16, 1fr); grid-template-rows: repeat(16, 1fr); width: 100%; height: 100%; }

        /* 타일 스타일 */
        .tile { border: 0.2px solid rgba(255, 255, 255, 0.1); position: relative; }
        .tile.owner-mingyu { background: rgba(34, 197, 94, 0.25); }
        .tile.owner-sechan { background: rgba(59, 130, 246, 0.25); }
        .tile.owner-manjung { background: rgba(239, 68, 68, 0.25); }
        .unit-badge { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; text-shadow: 0 0 3px #000; pointer-events: none; }

        /* 줌 컨트롤 UI (화면 왼쪽 하단) */
        .zoom-ctrl { position: absolute; bottom: 20px; left: 20px; display: flex; flex-direction: column; gap: 5px; z-index: 600; }
        .z-btn { width: 40px; height: 40px; background: var(--card); border: 1px solid var(--accent); color: white; border-radius: 5px; font-size: 20px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* 정보 패널 */
        #info-panel { width: 280px; background: var(--card); border-left: 2px solid #334155; padding: 1rem; overflow-y: auto; z-index: 500; }
        
        /* 로그인 창 */
        #overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(15px); }
        .login-btn { padding: 1rem 3rem; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; color: white; margin-bottom: 10px; width: 280px; }
    </style>
</head>
<body>
    <div id="overlay">
        <h2 style="letter-spacing: 5px; color: var(--accent);">ORN STRATEGY</h2>
        <div class="btn-group">
            <button class="login-btn" style="background:var(--mingyu)" onclick="login('서민규')">서민규 사령관</button>
            <button class="login-btn" style="background:var(--sechan)" onclick="login('박세찬')">박세찬 사령관</button>
            <button class="login-btn" style="background:var(--manjung)" onclick="login('김만중')">김만중 사령관</button>
        </div>
    </div>

    <div class="header">
        <div id="display-name" style="font-weight:bold; color:var(--accent);">COMMAND CENTER</div>
        <div>예산: <b id="money" style="color:var(--accent); font-size:16px;">0</b> G</div>
    </div>

    <div class="main-container">
        <div id="map-viewport">
            <div id="map-layer">
                <div id="battle-map">
                    <div id="grid-overlay"></div>
                </div>
            </div>
            <div class="zoom-ctrl">
                <button class="z-btn" onclick="adjustZoom(1.2)">+</button>
                <button class="z-btn" onclick="adjustZoom(0.8)">-</button>
                <button class="z-btn" onclick="resetView()" style="font-size:12px;">Reset</button>
            </div>
        </div>

        <div id="info-panel">
            <div id="panel-content"><p style="text-align:center; opacity:0.5;">구역을 선택하십시오.</p></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://friendwargme-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myName = "", selectedId = null;
        let scale = 0.8, posX = 20, posY = 20; // 초기 위치 및 배율
        const passwords = { "서민규": "140625", "박세찬": "1234**", "김만중": "98765" };

        window.login = (user) => {
            const pw = prompt(`${user} 사령관님, 보안 코드를 입력하십시오.`);
            if (pw === passwords[user]) {
                myName = user;
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('display-name').innerText = `HQ: ${myName}`;
                initInteraction();
                syncData();
            }
        };

        function syncData() {
            onValue(ref(db, `players/${myName}/resources/money`), s => {
                document.getElementById('money').innerText = Math.floor(s.val() || 0).toLocaleString();
            });

            onValue(ref(db, 'provinces'), (snapshot) => {
                const grid = document.getElementById('grid-overlay');
                const data = snapshot.val() || {};
                grid.innerHTML = "";

                for(let i=1; i<=256; i++) {
                    const id = `P${i}`;
                    const p = data[id] || { id: id, owner: "중립", population: 50000 };
                    const tile = document.createElement('div');
                    
                    let ownerStr = String(p.owner || "중립");
                    let ownerClass = ownerStr.includes("서민규") ? "owner-mingyu" : (ownerStr.includes("박세찬") ? "owner-sechan" : (ownerStr.includes("김만중") ? "owner-manjung" : ""));

                    tile.className = `tile ${ownerClass}`;
                    if(id === selectedId) tile.style.boxShadow = "inset 0 0 15px var(--accent)";
                    tile.innerHTML = `<span style="font-size:8px; opacity:0.3; position:absolute; top:1px; left:1px;">${id}</span>`;
                    
                    if (p.unit?.count > 0) tile.innerHTML += `<div class="unit-badge">🎖️${p.unit.count}</div>`;

                    tile.onclick = (e) => {
                        e.stopPropagation();
                        selectedId = id;
                        updateInfoPanel(p);
                        syncData(); // 하이라이트 즉시 갱신
                    };
                    grid.appendChild(tile);
                }
            });
        }

        // 🔍 줌 & 드래그 엔진
        function initInteraction() {
            const viewport = document.getElementById('map-viewport');
            const layer = document.getElementById('map-layer');

            const updateTransform = () => {
                layer.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
            };

            // 1. 드래그 (PC/모바일)
            let isDragging = false, lastX, lastY;
            const onStart = (e) => {
                isDragging = true;
                const touch = e.touches ? e.touches[0] : e;
                lastX = touch.clientX; lastY = touch.clientY;
            };
            const onMove = (e) => {
                if (!isDragging) return;
                const touch = e.touches ? e.touches[0] : e;
                posX += touch.clientX - lastX;
                posY += touch.clientY - lastY;
                lastX = touch.clientX; lastY = touch.clientY;
                updateTransform();
            };
            const onEnd = () => isDragging = false;

            viewport.addEventListener('mousedown', onStart);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onEnd);
            viewport.addEventListener('touchstart', onStart, {passive: false});
            viewport.addEventListener('touchmove', onMove, {passive: false});
            viewport.addEventListener('touchend', onEnd);

            // 2. 휠 줌 (PC)
            viewport.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                adjustZoom(delta);
            }, {passive: false});

            // 3. 줌 버튼 함수 연결
            window.adjustZoom = (amount) => {
                scale = Math.min(Math.max(0.3, scale * amount), 4);
                updateTransform();
            };
            window.resetView = () => { scale = 0.8; posX = 20; posY = 20; updateTransform(); };

            updateTransform(); // 초기 실행
        }

        function updateInfoPanel(p) {
            document.getElementById('panel-content').innerHTML = `
                <h3>${p.id} 구역</h3>
                <p>인구: ${(p.population || 50000).toLocaleString()}</p>
                <p>소유: ${p.owner || '중립'}</p>
                <hr style="border:0.5px solid #334155;">
                <button class="cmd-btn" style="background:var(--mingyu)">군사 모집</button>
                <button class="cmd-btn" style="background:#8b5cf6">건설</button>
            `;
        }
    </script>
</body>
</html>
